name: Scheduled Rebuild - Cloudflare Pages

on:
  schedule:
    - cron: '0 5-14 * * 1-6'   # Every hour, 10:30 AM to 7:30 PM IST, Mon-Sat
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=YOUR_CLOUDFLARE_PAGES_PROJECT_NAME
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
